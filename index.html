<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفیشنل ویڈیو ڈاؤنلوڈر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>ویڈیو ڈاؤنلوڈر</h1>
    <p>اپنا پلیٹ فارم منتخب کریں:</p>

    <div class="platform-tabs">
        <button class="tab-btn" onclick="selectPlatform(this, 'youtube')">YouTube</button>
        <button class="tab-btn" onclick="selectPlatform(this, 'facebook')">Facebook</button>
        <button class="tab-btn" onclick="selectPlatform(this, 'tiktok')">TikTok</button>
    </div>

    <input type="text" id="urlInput" placeholder="یہاں ویڈیو کا لنک پیسٹ کریں...">
    
    <button class="main-btn" onclick="downloadFile()">فوری ڈاؤن لوڈ کریں</button>
    
    <p id="status" style="margin-top: 15px; color: #2e7d32; font-weight: bold;"></p>
</div>

<script src="script.js"></script>
</body>
</html>
