<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پریمیم ویڈیو ڈاؤنلوڈر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <h1>ویڈیو ڈاؤنلوڈر</h1>
        <div class="platforms">
            <button class="p-btn active" onclick="setPlatform(this, 'youtube')">یوٹیوب</button>
            <button class="p-btn" onclick="setPlatform(this, 'facebook')">فیس بک</button>
            <button class="p-btn" onclick="setPlatform(this, 'tiktok')">ٹک ٹاک</button>
        </div>
        <input type="text" id="urlInput" placeholder="لنک یہاں پیسٹ کریں...">
        <button class="download-btn" onclick="downloadVideo()">ڈاؤن لوڈ کریں ⬇️</button>
        <p id="msg"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
