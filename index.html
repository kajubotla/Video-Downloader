<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>ویڈیو ڈاؤنلوڈر</h1>
    <p>سوشل میڈیا سے ویڈیوز محفوظ کریں</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="selectTab(this, 'TikTok')">TikTok</button>
        <button class="tab-btn" onclick="selectTab(this, 'Facebook')">Facebook</button>
        <button class="tab-btn" onclick="selectTab(this, 'YouTube')">YouTube</button>
    </div>

    <input type="text" id="urlInput" placeholder="ویڈیو کا لنک یہاں پیسٹ کریں...">
    <button class="download-btn" onclick="processDownload()">ڈاؤن لوڈ کریں ⬇️</button>
    
    <p class="footer-text">✅ محفوظ اور تیز رفتار ڈاؤن لوڈنگ</p>
</div>

<script src="script.js"></script>
</body>
</html>
